---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bifrost-prod-pods-reader
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bifrost-prod-pods-reader
subjects:
  - kind: ServiceAccount
    name: bifrost-prod-ksa
    namespace: bifrost-prod
roleRef:
  kind: ClusterRole
  name: bifrost-prod-pods-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bifrost-prod-argocd-app-patcher
  namespace: argocd
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bifrost-prod-argocd-app-patcher
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: bifrost-prod-ksa
    namespace: bifrost-prod
roleRef:
  kind: Role
  name: bifrost-prod-argocd-app-patcher
  apiGroup: rbac.authorization.k8s.io
