{{define "base"}}<!DOCTYPE html>
<html lang="en" data-theme="synthwave">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bifrost</title>
  <link rel="stylesheet" href="/static/style.css{{with cssVersion}}?v={{.}}{{end}}">
</head>
<body class="min-h-screen">
  <div class="navbar bg-base-100 shadow-sm">
    <div class="flex-1">
      <a href="/" class="btn btn-ghost text-xl">Bifrost</a>
    </div>
    {{if .Session}}
    <div class="flex-none">
      <form method="POST" action="/auth/logout">
        <button class="btn btn-ghost btn-sm">Sign out</button>
      </form>
    </div>
    {{end}}
  </div>

  {{if .Flash}}
  <div class="container mx-auto px-4 mt-4">
    <div class="alert alert-{{if eq (printf "%s" .Flash.Kind) "error"}}error{{else}}success{{end}}">
      <span>{{.Flash.Msg}}</span>
    </div>
  </div>
  {{end}}

  <main class="container mx-auto px-4 py-6 max-w-3xl">
    {{template "content" .}}
  </main>

  <script>
    // Progressive enhancement for promote: confirm, show a spinner, POST via
    // fetch, then poll the service status until prod has rolled out the new
    // SHA. With JS disabled the plain <form> still POSTs and redirects.
    //
    // A background refresh also re-renders the service list every few seconds
    // (so a build that starts, a deploy that finishes, or a health change shows
    // up without a manual reload). It's paused while a promote is in flight and
    // while the tab is hidden.
    (function () {
      var POLL_MS = 3000;            // post-promote rollout poll
      var TIMEOUT_MS = 5 * 60 * 1000;
      var IDLE_MS = 30000;           // background refresh while everything's settled
      var ACTIVE_MS = 3000;          // ...and while a build/deploy is in flight
      var promoting = false;         // pauses the background refresh
      var refreshTimer = null;
      var refreshing = false;        // a background refresh fetch is in flight

      function spinner(label) {
        return '<span class="loading loading-spinner loading-xs"></span> ' + label;
      }

      function pollUntilRolledOut(svc, newTag, started) {
        function again() {
          if (Date.now() - started > TIMEOUT_MS) { location.reload(); return; }
          setTimeout(function () { pollUntilRolledOut(svc, newTag, started); }, POLL_MS);
        }
        fetch('/services/' + encodeURIComponent(svc) + '/status', {
          headers: { 'Accept': 'application/json' }
        })
          .then(function (r) { return r.json(); })
          .then(function (s) {
            if (s.prodTag === newTag) { location.reload(); return; }
            again();
          })
          .catch(again);
      }

      // Delegated so promote forms swapped in by the background refresh keep
      // working without re-binding listeners.
      document.addEventListener('submit', function (e) {
        var form = e.target.closest('form.js-promote');
        if (!form) return;
        e.preventDefault();
        var svc = form.dataset.service;
        var tag = form.dataset.newtag;
        if (!confirm('Promote ' + svc + ' prod to ' + tag + '?')) return;

        promoting = true; // stop the background refresh from clobbering the spinner
        var btn = form.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.innerHTML = spinner('Promoting…');
        var badge = document.querySelector('[data-service="' + svc + '"] .js-badge');
        if (badge) {
          badge.innerHTML = '<span class="badge badge-info gap-1">' +
            '<span class="loading loading-spinner loading-xs"></span>deploying…</span>';
        }

        fetch(form.action, {
          method: 'POST',
          headers: { 'Accept': 'application/json' },
          body: new URLSearchParams(new FormData(form))
        })
          .then(function (r) { return r.json(); })
          .then(function (res) {
            if (!res.ok) { location.reload(); return; } // flash shows the reason
            btn.innerHTML = spinner('Deploying…');
            pollUntilRolledOut(svc, res.newTag, Date.now());
          })
          .catch(function () { location.reload(); });
      });

      // Background refresh: swap freshly-rendered rows into the list in place,
      // adapting cadence to whether anything is in flight. Slow while every
      // service is settled (just enough to notice a build or deploy starting),
      // fast once a row is marked data-active so we catch it finishing.
      function anyActive() {
        return !!document.querySelector('#service-list [data-active]');
      }
      function scheduleRefresh(delay) {
        clearTimeout(refreshTimer);
        refreshTimer = setTimeout(refreshRows, delay);
      }
      function refreshRows() {
        if (promoting || document.hidden || refreshing) { scheduleRefresh(IDLE_MS); return; }
        refreshing = true;
        fetch('/partial/status', { headers: { 'Accept': 'text/html' } })
          .then(function (r) {
            // Session expired → middleware redirects to login. Reload the whole
            // page so the user lands on the sign-in flow, rather than swapping
            // the login page's HTML into the service list.
            if (r.redirected) { location.reload(); return null; }
            return r.ok ? r.text() : null;
          })
          .then(function (html) {
            // Re-check promoting: a promote may have started mid-flight, and
            // swapping now would wipe out its spinner.
            if (html === null || promoting) return;
            var list = document.getElementById('service-list');
            if (!list) return;
            // Preserve which cards the user has expanded: the swap replaces the
            // whole list (server always renders cards collapsed), so remember
            // the open ones and re-open them afterwards.
            var open = {};
            list.querySelectorAll('details[data-service][open]').forEach(function (d) {
              open[d.getAttribute('data-service')] = true;
            });
            list.innerHTML = html;
            list.querySelectorAll('details[data-service]').forEach(function (d) {
              if (open[d.getAttribute('data-service')]) d.open = true;
            });
          })
          .catch(function () { /* transient — try again next tick */ })
          .finally(function () {
            refreshing = false;
            // Re-evaluate against the rows we just swapped in: a deploy that
            // finished drops us back to the slow cadence.
            scheduleRefresh(anyActive() ? ACTIVE_MS : IDLE_MS);
          });
      }
      // Kick off from the server-rendered initial state, and refresh promptly
      // whenever the tab returns to the foreground.
      scheduleRefresh(anyActive() ? ACTIVE_MS : IDLE_MS);
      document.addEventListener('visibilitychange', function () {
        if (!document.hidden) scheduleRefresh(0);
      });
    })();
  </script>
</body>
</html>{{end}}
