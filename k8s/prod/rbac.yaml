---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bifrost-prod-pods-reader
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bifrost-prod-pods-reader
subjects:
  - kind: ServiceAccount
    name: bifrost-prod-ksa
    namespace: bifrost-prod
roleRef:
  kind: ClusterRole
  name: bifrost-prod-pods-reader
  apiGroup: rbac.authorization.k8s.io
---
# Cluster-scoped (not a Role in the argocd namespace) because the
# kustomization's global `namespace:` transformer would rewrite a namespaced
# Role/RoleBinding into bifrost-prod, silently breaking promote RBAC.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bifrost-prod-argocd-app-patcher
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bifrost-prod-argocd-app-patcher
subjects:
  - kind: ServiceAccount
    name: bifrost-prod-ksa
    namespace: bifrost-prod
roleRef:
  kind: ClusterRole
  name: bifrost-prod-argocd-app-patcher
  apiGroup: rbac.authorization.k8s.io
